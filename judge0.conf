################################################################################
# Judge0 CE Configuration
################################################################################

# Redis
REDIS_HOST=redis
REDIS_PORT=6379

# Postgres (Judge0's own internal DB — separate from our app DB)
POSTGRES_HOST=db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=syncboard
POSTGRES_PASSWORD=syncboard_secret

# Execution limits (can be overridden per-submission)
CPU_TIME_LIMIT=5
CPU_EXTRA_TIME=1
WALL_TIME_LIMIT=10
MEMORY_LIMIT=128000
STACK_LIMIT=64000
MAX_PROCESSES_AND_OR_THREADS=60
ENABLE_PER_PROCESS_AND_THREAD_TIME_LIMIT=false
ENABLE_PER_PROCESS_AND_THREAD_MEMORY_LIMIT=false
MAX_FILE_SIZE=1024

# Sandbox
USE_DOCS_AS_HOMEPAGE=false
ENABLE_BATCHED_SUBMISSIONS=true
MAX_SUBMISSION_BATCH_SIZE=20

# Authentication (disable for local dev)
AUTHN_HEADER=
AUTHN_TOKEN=
